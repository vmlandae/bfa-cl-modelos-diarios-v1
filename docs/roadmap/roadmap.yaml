# =============================================================================
# ROADMAP — BFA-CL Modelos Diarios
# =============================================================================
#
# Este archivo es la FUENTE DE VERDAD para la planificación de features.
# Se renderiza automáticamente en MkDocs (docs/roadmap/) y es editable
# por cualquier miembro del equipo via Merge Request.
#
# Workflow:
#   1. Crear rama: git checkout -b feat/roadmap-actualizar-XX
#   2. Editar este archivo
#   3. Commit: git commit -m "roadmap: actualizar estado de feature XX"
#   4. Crear MR en GitLab → review → merge
#
# Estados válidos: backlog | planificado | en-progreso | completado | descartado
# Prioridades: crítica | alta | media | baja
# Tamaños: XS (<2h) | S (2h-1d) | M (1d-3d) | L (3d-1w) | XL (1w-2w) | XXL (2w+)
#
# Última actualización: 2026-03-10
# =============================================================================

