      - "Valida que el YAML de config es consistente con el orquestador"

  - id: F11
    titulo: "Logging Estructurado — De print() a observabilidad"
    descripcion: >
      core/logger.py con handler dual: consola (emojis, prefijo [modelo])
      y archivo JSONL (logs/{fecha}/modelos.jsonl). Monkey-patch de
      builtins.print para captura completa. contexto_modelo() thread-safe
      vía contextvars. Compatible con StdoutRedirector de GUI.
    estado: completado
    prioridad: alta
    tamano: M
    sprint: "S1-2026"
    asignado: vlandaetat
    fecha_completado: "2026-02-27"
    etiquetas: [observabilidad, refactor, core]
    dependencias: []
    archivos_afectados:
