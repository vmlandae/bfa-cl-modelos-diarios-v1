features:

  # ---------------------------------------------------------------------------
  # SPRINT 1: Quick Wins & Fundamentos
  # ---------------------------------------------------------------------------

  - id: F02
    titulo: "Máquina del Tiempo — Snapshots de parámetros"
    descripcion: >
      Snapshot automático de parámetros Excel antes de cada ejecución.
      shutil.copy2 en orquestador.py → snapshots/{YYYYMMDD}/{modelo}/.
      Lee rutas de excel_parametros_input del YAML de config.
      Aborta modelo si la copia falla (RuntimeError).
    estado: completado
    prioridad: crítica
    tamano: XS
    sprint: "S1-2026"
    asignado: vlandaetat
    fecha_completado: "2026-02-27"
    etiquetas: [regulatorio, auditoria, orquestador]
    dependencias: []
    archivos_afectados:
      - "core/orquestador.py"
    criterios_aceptacion:
      - "Cada ejecución copia los parámetros Excel a snapshots/{fecha}/{modelo}/"
      - "No afecta el tiempo de ejecución (< 2s overhead)"
      - "Funciona para los 10 modelos"
    notas: >
      20 líneas de código. Valor regulatorio enorme (NCG 325).
      Los parámetros locales ya están en el repo, pero los de inversiones
      viven en la red. El snapshot captura ambos.

  - id: F14
    titulo: "Cache de Primera Vuelta — CSV de red a parquet local"
    descripcion: >
      Extender cache_tablas.py para cachear los CSV de interfaz
      (ProductosMercadoLiquidezGCP*.txt) como parquet local.
      Copia raw .txt a data/cache/raw/ con metadata JSON (timestamp, MD5).
      Hooks pre/post ejecución en orquestador con threading.Lock.
      Verificación post-ejecución detecta cambios en red durante ejecución.
    estado: completado
    prioridad: alta
    tamano: S
    sprint: "S1-2026"
    asignado: vlandaetat
    fecha_completado: "2026-02-27"
    etiquetas: [performance, cache, red]
    dependencias: []
    archivos_afectados:
      - "procesamiento_datos_input/cache_tablas.py"
      - "RF_Modelo_Prepago_Consumo/mr_prepago_consumo.py"
      - "RF_Modelo_Prepago_Hipotecario/mr_prepago_hipotecario.py"
      - "RF_Modelo_Mora_Consumo/ml_mora_consumo.py"
      - "RF_Modelo_Mora_CAE/ml_mora_cae.py"
      - "RF_Modelo_Mora_Hipotecario/ml_mora_hipotecario.py"
      - "RF_Modelo_Mora_Comercial/ml_mora_comercial.py"
    criterios_aceptacion:
      - "Primera lectura del día: lee CSV de red, guarda parquet"
      - "Lecturas siguientes: lee parquet local (~95% más rápido)"
      - "Flag --forzar-recarga para ignorar caché"
    notas: >
      cache_tablas.py ya tiene un TODO explícito para esto.
      Extensión natural de la infraestructura existente.

  - id: F13
    titulo: "Pre-flight Checks — Verificación de dependencias"
    descripcion: >
      Health checks de rutas de red, bases Access, Excel de parámetros y
      driver ODBC ANTES de ejecutar modelos. Evita esperar minutos para
      descubrir que la red está caída. Deduplicación automática de rutas
      compartidas entre modelos.
    estado: completado
    prioridad: alta
    tamano: S
    sprint: "S1-2026"
    asignado: vlandaetat
    fecha_completado: "2026-03-12"
    etiquetas: [ux, robustez, red]
    dependencias: []
    archivos_afectados:
      - "core/preflight.py (nuevo)"
      - "core/orquestador.py"
    criterios_aceptacion:
      - "Verifica accesibilidad de rutas de red para modelos seleccionados"
      - "Verifica conexión a bases Access"
      - "Verifica Excel de parámetros"
      - "Verifica driver ODBC Access instalado"
      - "Reporta problemas ANTES de iniciar ejecución"
      - "Deduplicación de rutas compartidas entre modelos"
    notas: >
      Rama: feat/F13-preflight-checks (3e7889b), mergeado a main.
      Integrado en ejecutar_modelos_paralelo() y ejecutar_modelo_secuencial().
      CheckResult/PreflightReport como dataclasses.

  - id: F15
    titulo: "Testing Mínimo Viable — Tests de configuración"
    descripcion: >
      Tests de nivel 1 que validan configuración sin dependencias externas:
