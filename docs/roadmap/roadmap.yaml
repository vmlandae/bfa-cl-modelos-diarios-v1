      AMORTIZACION/INTERES del output BQ por modelo. Habría detectado
      el error grueso reciente. Adicionalmente aplica controles
      de output: invariantes (codigo_empresa=1, monedas válidas), nulls en
      required, ratio de filas, productos desaparecidos, freshness, delta
      intermensual. Persiste resultados en BQ controles_diarios. Patrón
      calcado de core/control_interfaces.py (severidad OK/WARNING/CRITICAL).
      Configurable por YAML con defaults y override por modelo. Política
      CRITICAL no degrada status_global (decisión 2026-05-13).
