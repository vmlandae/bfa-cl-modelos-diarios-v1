# Configuración de modelos legacy (no implementados en Python)
# Estos modelos se ejecutan en Excel/VBA y solo extraemos sus outputs

# Configuración de GCP
gcp:
  proyecto_id: "bfa-cl-trade-price-report-dev"
  dataset_id: "bfa_cl_prd_financial_risk_dly_proc_models"

# Definición de modelos old
# Cada modelo debe tener:
#   - descripcion: Descripción del modelo
#   - ruta_excel: Ruta al archivo Excel (puede ser ruta de red \\servidor\...)
#   - hoja: Nombre de la hoja a extraer (por defecto "DESARROLLO")
#   - tabla_bigquery: Nombre de la tabla destino en BigQuery
#   - activo: true/false para activar/desactivar la carga

