# ============================================================================
# Reporte de amortizacion por email (primera vuelta)
# ============================================================================
# Reportes de amortizacion por email -- Sistema multi-tipo (F26)
# ============================================================================
#
# Estructura:
#   email_report:
#     <config compartida>          <- aplica a todos los tipos
#     reportes:
#       primera_vuelta:            <- compara amortizacion V1 (t vs t-1)
#       segunda_vuelta:            <- compara amortizacion V2 (t vs t-1)
#       chequeo_interfaces:        <- sumas de control PML GCP/CMR (futuro)
#
# Cada tipo tiene su propio asunto_template.
# {fecha} y {fecha_anterior} se reemplazan automaticamente con las fechas
# de proceso reales.
# ============================================================================
email_report:
  enabled: true
  destinatarios:
    - "riesgofinanciero@bancofalabella.cl"
  modo: "send"            # "send" = envio directo | "display" = abre en Outlook para revision
  auto_post_ejecucion: false   # true = envia automaticamente tras ejecucion en run_diario.bat

  reportes:
    primera_vuelta:
      enabled: true
      asunto_template: "Reporte Amortizacion Primera Vuelta -- {fecha} vs {fecha_anterior}"
    segunda_vuelta:
      enabled: true
      asunto_template: "Reporte Amortizacion Segunda Vuelta -- {fecha} vs {fecha_anterior}"
    chequeo_interfaces:
      enabled: false       # pendiente de implementacion (F26 Fase 5)
      asunto_template: "Chequeo Interfaces PML -- {fecha}"

# ============================================================================
# Control exploratorio de interfaces PML (F26 Fase 5)
# ============================================================================
#
# Analiza archivos ProductosMercadoLiquidez (GCP y CMR) comparando t vs t-1:
#   - Sumas de AMORTIZACION (Capital) e INTERES por producto/moneda
#   - Conteo de registros por grupo
#   - Evaluacion de umbrales de tolerancia por producto
#   - Envio de reporte HTML via Outlook
#
# Reemplaza completamente el proceso legacy de PROCESOS_DIARIOS_MODELOS/main.py.
# ============================================================================
control_interfaces:
  enabled: true
  ruta_unc_base: "\\\\vmdvorak\\Riesgo Financiero Folder\\RRFF-GCP\\Cartera\\input"

  # Email
  destinatarios:
    - "riesgofinanciero@bancofalabella.cl"
  modo: "send"                       # "send" = envio directo | "display" = abre en Outlook
  auto_con_primera_vuelta: true      # ejecutar automaticamente con primera_vuelta

  # Horarios esperados de llegada de archivos
  horario_esperado_cmr: "09:00"
  horario_esperado_gcp: "10:00"

  # Polling / Watcher (modo automatico)
  watcher:
    enabled: false                   # activar para modo automatico
    polling_intervalo_segundos: 300
    timeout_alerta_minutos: 90       # alerta si no llegan a hora + 90min
    timeout_abortar_minutos: 180     # dejar de intentar tras 3h

  # Backup management (legacy, desactivable)
  backup:
    enabled: true
    gcp:
      ruta_destino: "\\\\vmdvorak\\Riesgo Financiero Folder\\RRFF-GCP\\Cartera\\input"
      sufijo_backup: "_Backup.TXT"
    cmr:
      enabled: false                 # CMR no hace backup actualmente

  # Interfaces: configuracion por tipo de archivo PML
  interfaces:
    gcp:
      patron_archivo: "ProductosMercadoLiquidezGCP{fecha}.txt"
      patron_archivo_t1: "ProductosMercadoLiquidezGCP{fecha}_Backup.txt"
      columnas:
        - "FECHA_PROCESO"
        - "SISTEMA"
        - "CODIGO_SUBPRODUCTO"
        - "MONEDA_ORIGEN"
        - "AMORTIZACION"
        - "INTERES"
        - "FECHA_VENCIMIENTO_CUOTA"
      tipos_datos:
        SISTEMA: str
        CODIGO_SUBPRODUCTO: str
        MONEDA_ORIGEN: str
        AMORTIZACION: float
        INTERES: float
        FECHA_VENCIMIENTO_CUOTA: str
      agrupacion: ["SISTEMA", "MONEDA_ORIGEN"]
      sistemas_vistas: ["CCT", "CVI"]
      asunto_template: "Comparacion Interfaz de Datos al {fecha}"
    cmr:
      patron_archivo: "ProductosMercadoLiquidezCMR{fecha}.txt"
      patron_archivo_t1: "ProductosMercadoLiquidezCMR{fecha}.txt"
      columnas:
        - "FECHA_PROCESO"
        - "CODIGO_PRODUCTO"
        - "CODIGO_SUBPRODUCTO"
        - "AMORTIZACION"
        - "INTERES"
        - "FECHA_VENCIMIENTO_CUOTA"
      tipos_datos:
        CODIGO_PRODUCTO: str
        CODIGO_SUBPRODUCTO: str
        AMORTIZACION: float
        INTERES: float
        FECHA_VENCIMIENTO_CUOTA: str
      agrupacion: ["CODIGO_SUBPRODUCTO"]
      asunto_template: "Comparacion Interfaz de Datos CMR al {fecha}"

  # Umbrales de tolerancia por producto
  # |delta%| > warning -> amarillo, |delta%| > critical -> rojo
  umbrales:
    default:
      capital_warning_pct: 5.0
      capital_critical_pct: 15.0
      interes_warning_pct: 5.0
      interes_critical_pct: 15.0
      registros_warning_pct: 5.0
      registros_critical_pct: 20.0
    gcp:
      DAP:
        capital_warning_pct: 2.0
        capital_critical_pct: 5.0
      DAPM:
        capital_warning_pct: 10.0
        capital_critical_pct: 30.0
      BONOS:
        capital_warning_pct: 1.0
        capital_critical_pct: 5.0
      CCT:
        capital_warning_pct: 3.0
        capital_critical_pct: 10.0
    cmr: {}   # completar iterativamente con el equipo

# ============================================================================
# Controles diarios de outputs (F29 — sprint S6-2026)
# ============================================================================
# Motor: core/controles_outputs.py + core/controles_cuadratura.py.
# Resultados persistidos en BQ `controles_diarios`.
# Política CRITICAL: no degrada status_global (decisión 2026-05-13).
controles:
  enabled: true
  version_motor: "1.0"

  # Defaults aplicables a todos los modelos.
  defaults:
    cuadratura:
      # Tolerancia laxa porque los modelos de mora aplican factores
      # que cambian el agregado de forma sistemática. Calibrar por
      # modelo (sección `por_modelo`) cuando se tengan datos reales.
      tolerancia_pct: { warning: 10.0, critical: 50.0 }
    nulls_required:
      campos: ["FECHA_PROCESO", "CODIGO_PRODUCTO", "CODIGO_SUBPRODUCTO"]
      nivel: "CRITICAL"
    invariantes:
      codigo_empresa: [1]
      monedas_validas: ["CLP", "CLF", "USD"]
      # Algunos modelos guardan códigos numéricos en MONEDA_ORIGEN
      # (999=CLP, 998=CLF, 13=USD). Validar ambos sets.
      monedas_origen_numericas_validas: ["999", "998", "13"]
    n_filas:
      warning_ratio: [0.5, 2.0]
      critical_ratio: [0.3, 3.0]
    delta:
      warning_pct: 5.0
      critical_pct: 15.0

  # Override por modelo (deep merge sobre defaults).
  por_modelo:
    ml_inversiones:
      delta: { warning_pct: 10.0, critical_pct: 30.0 }
    ml_mora_consumo:
      delta: { critical_pct: 8.0 }
      # Mora aplica matriz de transición + factor global; el output puede
      # alejarse mucho del input. Tolerancia inicial calibrada para detectar
      # roturas gruesas (output cero, factor invertido), no precisión exacta.
      cuadratura:
        tolerancia_pct: { warning: 20.0, critical: 80.0 }
    ml_mora_cae:
      cuadratura:
        tolerancia_pct: { warning: 20.0, critical: 80.0 }
    ml_mora_hipotecario:
      cuadratura:
        tolerancia_pct: { warning: 20.0, critical: 80.0 }
    ml_mora_comercial:
      cuadratura:
        tolerancia_pct: { warning: 20.0, critical: 80.0 }
    mr_prepago_consumo:
      # Prepago re-bucketea el flujo en 90 días; suma agregada debería
      # preservarse casi 1:1 vs input PML.
      cuadratura:
        tolerancia_pct: { warning: 5.0, critical: 20.0 }
    mr_prepago_hipotecario:
      cuadratura:
        tolerancia_pct: { warning: 5.0, critical: 20.0 }
    mr_ssv:
      # SSV es mensual (EOM); ratio diario de filas no aplica igual.
      n_filas:
        warning_ratio: [0.7, 1.5]
        critical_ratio: [0.5, 2.0]

  # Configuración de cuadratura input ↔ output por modelo.
  # `tipo: manual` desactiva cuadratura (mantiene resto de controles).
  # Los filtros `sistemas` y `codigo_producto` reproducen el filtro real
  # que cada modelo aplica al PML antes de procesar (ver RF_Modelo_*/).
  cuadratura_inputs:
    ml_mora_consumo:        { tipo: "pml_gcp", sistemas: ["CRC", "REC"], codigo_producto: "150001" }
    ml_mora_cae:            { tipo: "pml_gcp", sistemas: ["CRUGE"] }
    ml_mora_hipotecario:    { tipo: "pml_gcp", sistemas: ["HIP"],        codigo_producto: "150003" }
    ml_mora_comercial:      { tipo: "pml_gcp", sistemas: ["SEL"],        codigo_producto: "150001" }
    mr_prepago_consumo:     { tipo: "pml_gcp", sistemas: ["CRC", "REC"], codigo_producto: "150001" }
    mr_prepago_hipotecario: { tipo: "pml_gcp", sistemas: ["HIP"],        codigo_producto: "150003" }
    ml_nmd:                 { tipo: "access",  ruta_tabla: "Balance_NMD", columna_capital: "SALDO_CAPITAL" }
    ml_lc:                  { tipo: "access",  ruta_tabla: "Balance_LC",  columna_capital: "SALDO_CAPITAL" }
    ml_inversiones:         { tipo: "access",  ruta_tabla: "Balance_INV", columna_capital: "SALDO_CAPITAL" }
    mr_ssv:                 { tipo: "manual",  nota: "EOM, input subido desde Excel hardcoded (F27)" }
    mr_prepago_cmr:         { tipo: "manual",  nota: "Notebook productivo subido a BQ — ver docs/feats/cuadre-mr-prepago-cmr/hallazgos.md" }
