site_name: BFA-CL Modelos Diarios
site_description: Documentación del sistema de modelos diarios de Riesgo Financiero
site_author: Equipo Riesgo Financiero

repo_url: https://gitlab.falabella.tech/rmunozb/bfa-cl-modelos-diarios
repo_name: bfa-cl-modelos-diarios

theme:
  name: material
  custom_dir: docs/overrides
  language: es
  palette:
    - scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang: es
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Guía de Usuario:
    - Setup Practicante: guia/SETUP.md
    - Flujo Diario: guia/DAILY_WORKFLOW.md
    - Instalación (Desarrollador): guia/instalacion.md
    - Configuración: guia/configuracion.md
    - Uso Básico: guia/uso-basico.md
    - Troubleshooting: guia/TROUBLESHOOTING.md
    - Mermaid (Diagramas): guia/mermaid-local.md
  - Modelos:
    - Inversiones: modelos/inversiones.md
    - Prepago Consumo: modelos/prepago-consumo.md
    - Prepago Hipotecario: modelos/prepago-hipotecario.md
    - Prepago CMR: modelos/prepago-cmr.md
    - Mora Consumo: modelos/mora-consumo.md
    - Mora CAE: modelos/mora-cae.md
    - Mora Hipotecario: modelos/mora-hipotecario.md
    - Mora Comercial: modelos/mora-comercial.md
    - NMD: modelos/nmd.md
    - Línea de Crédito: modelos/lc.md
  - Roadmap:
    - Plan de Desarrollo: roadmap/index.md
    - Workflow Colaborativo: roadmap/workflow.md
  - Features:
    - Dashboard Quick Wins:
      - Brainstorm: feats/dashboard-quick-wins/brainstorm.md
      - Especificación: feats/dashboard-quick-wins/quick_wins_spec.md
    - Handoff Practicante:
      - Plan: feats/handoff-practicante/PLAN.md
    - Carga Históricos Pre-Python:
      - Plan: feats/carga-historicos/PLAN.md
    - Carga Modelos Old:
      - Diagnóstico: feats/carga-modelos-old/diagnostic.md
      - Plan v1: feats/carga-modelos-old/PLAN.md
      - Plan v2: feats/carga-modelos-old/PLAN-v2.md
    - Reestructura Parámetros:
      - Plan: feats/reestructura-parametros/PLAN.md
  - Desarrollo:
    - Arquitectura: desarrollo/arquitectura.md
    - Contribuir: desarrollo/contribuir.md
    - Changelog: CHANGELOG.md

extra_javascript: []

extra:
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.falabella.tech/rmunozb/bfa-cl-modelos-diarios
